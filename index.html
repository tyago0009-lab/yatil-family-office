<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Family Office — Grupo Yatil</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0d1117;color:#e2e8f0;font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
a{color:#60a5fa;text-decoration:none}a:hover{text-decoration:underline}
/* Header */
#hdr{background:#161b22;border-bottom:1px solid #30363d;padding:9px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0}
#hdr .logo{font-size:16px;font-weight:700;color:#58a6ff}
#hdr .sub{font-size:11px;color:#8b949e}
#hdr .stamp{margin-left:auto;font-size:11px;color:#6e7681;white-space:nowrap}
/* Nav */
#nav{background:#161b22;border-bottom:1px solid #30363d;display:flex;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch;scrollbar-width:thin}
.tab{padding:10px 18px;cursor:pointer;color:#8b949e;font-size:12.5px;font-weight:500;white-space:nowrap;border-bottom:2px solid transparent;transition:all .15s;user-select:none}
.tab:hover{color:#e6edf3;background:rgba(255,255,255,.04)}
.tab.on{color:#58a6ff;border-bottom-color:#58a6ff}
/* Main scroll area */
#main{flex:1;overflow-y:auto;overflow-x:hidden;padding:18px 18px 8px}
.pane{display:none}.pane.on{display:block}
/* Section titles */
h3{font-size:11px;font-weight:600;color:#8b949e;text-transform:uppercase;letter-spacing:.5px;margin:22px 0 10px}
h3:first-child{margin-top:0}
/* KPI cards */
.kgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:10px;margin-bottom:20px}
.kcard{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:13px 15px}
.klabel{font-size:10px;color:#6e7681;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.kval{font-size:19px;font-weight:700;color:#e6edf3;font-variant-numeric:tabular-nums}
.ksub{font-size:10px;color:#6e7681;margin-top:2px}
.kval.green{color:#3fb950}.kval.blue{color:#58a6ff}.kval.yellow{color:#e3b341}.kval.red{color:#f85149}
/* Status badges */
.b{display:inline-block;padding:1px 7px;border-radius:4px;font-size:10.5px;font-weight:600;white-space:nowrap}
.b-venda{background:#1f3666;color:#79b8ff}.b-estoque{background:#282d36;color:#8b949e}
.b-uso{background:#3b1f5e;color:#c084fc}.b-locado{background:#0d3122;color:#56d364}
.b-disp{background:#0d2f2f;color:#39d353}.b-excl{background:#3d2800;color:#e3b341}
/* Filters */
.fbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.fbar select,.fbar input{background:#161b22;border:1px solid #30363d;color:#e2e8f0;padding:5px 9px;border-radius:6px;font-size:12px;outline:none}
.fbar input{min-width:160px}
.fbar select:focus,.fbar input:focus{border-color:#58a6ff}
.btn{background:#1f3666;border:1px solid #388bfd;color:#79b8ff;padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;white-space:nowrap}
.btn:hover{background:#2d4d8a}
.btn.red{background:#3d0d0d;border-color:#f85149;color:#f85149}
.btn.green{background:#0d3122;border-color:#3fb950;color:#3fb950}
.cnt-lbl{color:#6e7681;font-size:11px}
/* Totals bar */
.tbar{display:flex;flex-wrap:wrap;gap:14px;background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px 15px;margin-bottom:14px}
.ti .tv{font-size:13px;font-weight:700;color:#e6edf3;font-variant-numeric:tabular-nums}
.ti .tl{font-size:10px;color:#6e7681;margin-top:1px}
/* Table wrapper — KEY FIX: max-height so scrollbar stays in viewport */
.tw{overflow:auto;border:1px solid #30363d;border-radius:8px;max-height:calc(100vh - 195px)}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:#1c2128;color:#8b949e;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;padding:8px 10px;text-align:left;white-space:nowrap;border-bottom:1px solid #30363d;position:sticky;top:0;z-index:2}
thead th.r{text-align:right}
tbody tr:hover{background:rgba(255,255,255,.025)}
tbody tr{border-bottom:1px solid #1c2128}
td{padding:6px 10px;color:#cdd9e5;white-space:nowrap}
td.r{text-align:right;font-variant-numeric:tabular-nums}
td.gray{color:#6e7681}td.green{color:#3fb950}td.red{color:#f85149}td.yellow{color:#e3b341}
/* Section rows in tables */
.sec-row td{background:#1a2433;color:#58a6ff;font-size:11px;font-weight:600;padding:5px 10px}
/* Subtotal / tfoot */
tfoot tr td{background:#1c2433;color:#79b8ff;font-weight:700;border-top:2px solid #30363d;padding:7px 10px;font-variant-numeric:tabular-nums;position:sticky;bottom:0;z-index:1}
tfoot .tfl{color:#6e7681;font-size:11px}
/* Edit row */
.edit-row td{background:#0d1621;padding:10px;border-bottom:2px solid #388bfd}
.edit-form{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end}
.edit-field{display:flex;flex-direction:column;gap:3px}
.edit-field label{font-size:10px;color:#8b949e;text-transform:uppercase;letter-spacing:.4px}
.edit-field input,.edit-field textarea{background:#161b22;border:1px solid #30363d;color:#e2e8f0;padding:5px 8px;border-radius:5px;font-size:12px;width:140px;outline:none}
.edit-field input:focus,.edit-field textarea:focus{border-color:#58a6ff}
.edit-field textarea{resize:vertical;height:52px;width:220px}
/* Modal overlay */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:900}
#pct-modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1c2128;border:1px solid #388bfd;border-radius:12px;padding:22px;z-index:901;min-width:300px}
#pct-modal h4{color:#e6edf3;margin-bottom:8px;font-size:14px}
#pct-modal p{color:#8b949e;font-size:11px;margin-bottom:14px;line-height:1.5}
#pct-modal .row{display:flex;gap:8px;align-items:center;margin-bottom:16px}
#pct-modal input{background:#0d1117;border:1px solid #30363d;color:#e6edf3;padding:8px 10px;border-radius:6px;width:90px;font-size:15px;outline:none}
#pct-modal input:focus{border-color:#58a6ff}
#pct-modal .btns{display:flex;gap:8px;justify-content:flex-end}
/* Semáforo colors */
.sem-r{color:#f85149;font-weight:700}.sem-y{color:#e3b341;font-weight:600}.sem-g{color:#3fb950}
/* News grid */
.news-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.news-refresh{background:transparent;border:1px solid #30363d;color:#8b949e;padding:4px 10px;border-radius:5px;font-size:11px;cursor:pointer}
.news-refresh:hover{border-color:#58a6ff;color:#58a6ff}
.news-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px}
.news-card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:13px;cursor:pointer;transition:border-color .15s}
.news-card:hover{border-color:#58a6ff}
.news-src{font-size:9px;color:#58a6ff;text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px;font-weight:600}
.news-title{font-size:12.5px;font-weight:600;color:#e6edf3;line-height:1.4;margin-bottom:5px}
.news-desc{font-size:11px;color:#8b949e;line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
.news-date{font-size:10px;color:#6e7681;margin-top:6px}
.news-loading{color:#6e7681;padding:30px;text-align:center;grid-column:1/-1}
.news-err{color:#f85149;font-size:12px;padding:20px;grid-column:1/-1}
/* Checkboxes */
.cb{width:14px;height:14px;cursor:pointer;accent-color:#58a6ff}
/* Print styles */
@media print{
  #hdr,#nav,.fbar,.tbar,.print-bar,tfoot,#overlay,#pct-modal{display:none!important}
  body{background:#fff;color:#000;overflow:visible}
  #main{overflow:visible;padding:0}
  .pane{display:block!important}
  .sec-row{display:none!important}
  .tw{max-height:none;overflow:visible;border:none}
  table{font-size:10px}
  thead th{background:#f5f5f5;color:#333;border-bottom:1px solid #ccc}
  td{color:#333;border-bottom:1px solid #eee}
  .b{border:1px solid #999}
  .b-venda,.b-estoque,.b-uso,.b-locado,.b-disp,.b-excl{background:transparent;color:#333}
  a{color:#333}
}
@media(max-width:600px){
  #main{padding:10px 8px}
  .tw{max-height:calc(100vh - 180px)}
  .news-grid{grid-template-columns:1fr}
  .kgrid{grid-template-columns:1fr 1fr}
  .kval{font-size:15px}
}
</style>
</head>

</div>

let S = JSON.parse(localStorage.getItem('yatil_s2') || 'null') || JSON.parse(JSON.stringify(D0));
function saveS(){ try{ localStorage.setItem('yatil_s2', JSON.stringify(S)); }catch(e){} }
function resetAll(){
  if(!confirm('Resetar todos os dados para o original do Excel?')) return;
  localStorage.removeItem('yatil_s2');
  S = JSON.parse(JSON.stringify(D0));
  filterPat(); filterCom(); renderCartas();
}

// ── Utils ──────────────────────────────────────────────────────────────
const fmtR = n => new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL',minimumFractionDigits:0,maximumFractionDigits:0}).format(n||0);
const fmtP = n => n!=null?(n*100).toFixed(1).replace('.',',')+'%':'-';
const fmtN = (n,d=2) => n!=null?Number(n).toFixed(d).replace('.',','):'-';
const fmtNm = n => n!=null?new Intl.NumberFormat('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0}).format(n):'-';

function badge(s){
  const m={'À VENDA':'b-venda','ESTOQUE':'b-estoque','EM USO':'b-uso','LOCADO':'b-locado','DISPONÍVEL':'b-disp','EXCLUSIVO':'b-excl','VENDIDO':'b-estoque'};
  return `<span class="b ${m[s]||'b-estoque'}">${s}</span>`;
}
function semC(v){ return v>=0.20?'sem-r':v>=0.10?'sem-y':'sem-g'; }
function semL(v){ return v>=0.20?'🔴 VENDER JÁ':v>=0.10?'🟡 AVALIAR':'🟢 MANTER'; }

// ── Navigation ─────────────────────────────────────────────────────────
function go(id,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));
  el.classList.add('on'); document.getElementById(id).classList.add('on');
  if(id==='painel' && !window._newsLoaded) loadNews();
}

// ══════════════════════════════════════════════════════════════════════
// PAINEL
// ══════════════════════════════════════════════════════════════════════
function renderPainel(){
  const pat = S.patrimonio;
  const sem = [...pat].filter(p=>p.pct_ao_ano>0&&p.imovel)
    .sort((a,b)=>b.pct_ao_ano-a.pct_ao_ano).slice(0,12);

  const semRows = sem.map(p=>`<tr>
    <td>${p.imovel} <span class="gray">/ ${p.unidade||'-'}</span></td>
    <td class="gray">${p.disposicao||'-'}</td>
    <td class="r ${semC(p.pct_ao_ano)}">${fmtP(p.pct_ao_ano)}</td>
    <td class="r ${semC(p.pct_ao_ano)}">${fmtP(p.valorizacao_pct)}</td>
    <td class="r gray">${fmtN(p.tempo_anos,1)} a</td>
    <td><span class="${semC(p.pct_ao_ano)}">${semL(p.pct_ao_ano)}</span></td>
    <td class="r">${fmtR(p.valor_tabela)}</td>
  </tr>`).join('');

  document.getElementById('painel').innerHTML = `
  <div class="news-header">
    <h3 style="margin:0">◆ Notícias Imobiliárias — Últimos 30 Dias</h3>
    <span id="news-updated" style="font-size:10px;color:#6e7681;margin-left:8px"></span>
    <button class="news-refresh" onclick="loadNews(true)">⟳ Atualizar</button>
  </div>
  <div class="news-grid" id="news-grid"><div class="news-loading">Carregando notícias...</div></div>

  <h3>◆ Semáforo de Valorização — Melhores Momentos de Venda</h3>
  <div class="tw" style="max-height:none">
    <table><thead><tr>
      <th>Imóvel / Unidade</th><th>Tipo</th>
      <th class="r">% ao Ano</th><th class="r">Valoriz. Total</th>
      <th class="r">Tempo</th><th>Status</th><th class="r">Valor Tabela</th>
    </tr></thead>
    <tbody>${semRows}</tbody></table>
  </div>
  <p style="font-size:10px;color:#6e7681;margin-top:-10px;margin-bottom:16px">ℹ Ordenado por % ao ano · dados da aba Patrimônio</p>
  `;
}

// News — lê de ./news.json gerado pelo GitHub Action
async function loadNews(force){
  if(!force && window._newsLoaded) return;
  window._newsLoaded = true;
  const grid = document.getElementById('news-grid');
  if(!grid) return;
  grid.innerHTML = '<div class="news-loading">🔄 Carregando notícias...</div>';
  try{
    const r = await fetch('./news.json?t='+Date.now(), {cache:'no-store'});
    if(!r.ok) throw new Error(r.status);
    const data = await r.json();
    if(!data.items||!data.items.length) throw new Error('empty');
    const upd = document.getElementById('news-updated');
    if(upd) upd.textContent = 'Atualizado: '+(data.updated||'');
    grid.innerHTML = data.items.map(item=>{
      const date = item.date ? new Date(item.date).toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'2-digit'}) : '';
      const safeLink = (item.link||'#').replace(/'/g,'%27');
      return `<div class="news-card" onclick="window.open('${safeLink}','_blank')">
        <div class="news-src">${item.source||''}</div>
        <div class="news-title">${item.title||''}</div>
        <div class="news-desc">${item.summary||'Clique para ler mais...'}</div>
        <div class="news-date">${date}</div>
      </div>`;
    }).join('');
  }catch(e){
    const grid2 = document.getElementById('news-grid');
    if(grid2) grid2.innerHTML = `<div class="news-err" style="grid-column:1/-1">
      ⏳ Notícias ainda não disponíveis — a primeira busca automática ocorrerá às <strong>7h, 12h ou 18h</strong> (horário de Brasília).<br>
      <small style="color:#6e7681">Para adiantar: acesse o repositório no GitHub → Actions → "Atualizar Notícias" → Run workflow</small>
    </div>`;
  }
}

function toggleEdit(idx){
  const row=document.getElementById(`edit-${idx}`);
  if(!row) return;
  const open=row.style.display==='none'||row.style.display==='';
  // Close all others
  document.querySelectorAll('.edit-row').forEach(r=>r.style.display='none');
  row.style.display=open?'table-row':'none';
  _editingIdx=open?idx:null;
}
function cancelEdit(idx){
  const row=document.getElementById(`edit-${idx}`);
  if(row) row.style.display='none';
}
function calcTabela(idx){
  const g=id=>document.getElementById(id);
  const va=parseFloat(g(`ef-va-${idx}`)?.value)||0;
  const pmt=parseFloat(g(`ef-pmt-${idx}`)?.value)||0;
  const vt=Math.round(va*(1+pmt/100));
  const el=g(`ef-vt-${idx}`);
  if(el) el.value=vt||'';
}
function saveEdit(idx){
  const r=S.patrimonio[idx];
  if(!r) return;
  const g=id=>document.getElementById(id);
  const gv=(id,fallback)=>{const el=g(id);return el&&el.value.trim()!==''?el.value.trim():fallback;};
  const gf=(id,fallback)=>{const v=parseFloat(g(id)?.value);return isNaN(v)?fallback:v;};
  r.status        = gv(`ef-st-${idx}`,r.status);
  r.imovel        = gv(`ef-im-${idx}`,r.imovel);
  r.unidade       = gv(`ef-un-${idx}`,r.unidade);
  r.matricula     = gv(`ef-mat-${idx}`,r.matricula);
  r.disposicao    = gv(`ef-disp-${idx}`,r.disposicao);
  r.vagas         = gf(`ef-vag-${idx}`,r.vagas);
  r.area_int      = gf(`ef-ai-${idx}`,r.area_int);
  r.area_tot      = gf(`ef-at-${idx}`,r.area_tot);
  r.data_aquis    = gv(`ef-da-${idx}`,r.data_aquis);
  r.valor_inicial = gf(`ef-vi-${idx}`,r.valor_inicial);
  r.valor_atual   = gf(`ef-va-${idx}`,r.valor_atual);
  r.valor_pretend = gf(`ef-vp-${idx}`,r.valor_pretend);
  const pmt=parseFloat(g(`ef-pmt-${idx}`)?.value);
  if(!isNaN(pmt)) r.pct_marg_tabela=pmt/100;
  r.valor_tabela  = Math.round((r.valor_atual||0)*(1+(r.pct_marg_tabela||0)));
  r.loc_base      = gf(`ef-lb-${idx}`,r.loc_base);
  const pml=parseFloat(g(`ef-pml-${idx}`)?.value);
  if(!isNaN(pml)) r.pct_marg_loc=pml/100;
  r.custo_mensal  = gf(`ef-cm-${idx}`,r.custo_mensal);
  r.iptu_anual    = gf(`ef-ip-${idx}`,r.iptu_anual);
  r.link_venda    = gv(`ef-lv-${idx}`,r.link_venda);
  r.link_locacao  = gv(`ef-ll-${idx}`,r.link_locacao);
  r.observacoes   = g(`ef-ob-${idx}`)?.value??r.observacoes;
  saveS(); filterPat();
}

// % modal
let _pctSecao='';
function openPctModal(secao){
  _pctSecao=secao;
  const count=S.patrimonio.filter(p=>p.secao===secao).length;
  const label=secao.replace('▶  ','').replace('▶ ','');
  document.getElementById('pct-desc').textContent=`${label} · ${count} unidades`;
  document.getElementById('pct-input').value='';
  document.getElementById('pct-modal').style.display='block';
  document.getElementById('overlay').style.display='block';
  document.getElementById('pct-input').focus();
}
function closePctModal(){
  document.getElementById('pct-modal').style.display='none';
  document.getElementById('overlay').style.display='none';
}
function applyPct(){
  const pct=parseFloat(document.getElementById('pct-input').value);
  if(isNaN(pct)){closePctModal();return;}
  const mult=1+pct/100;
  S.patrimonio.filter(p=>p.secao===_pctSecao).forEach(p=>{
    if(p.valor_atual)   p.valor_atual   = Math.round(p.valor_atual   * mult);
    if(p.valor_tabela)  p.valor_tabela  = Math.round(p.valor_tabela  * mult);
    if(p.valor_pretend) p.valor_pretend = Math.round(p.valor_pretend * mult);
    if(p.loc_base)      p.loc_base      = Math.round(p.loc_base      * mult);
    if(p.loc_tabela)    p.loc_tabela    = Math.round(p.loc_tabela    * mult);
  });
  saveS(); closePctModal(); filterPat();
}

function updateComSelCount(){

function printCom(selectedOnly){
  const checkedIdx=selectedOnly
    ? [...document.querySelectorAll('.com-cb:checked')].map(cb=>parseInt(cb.dataset.idx))
    : null;
  const rows = checkedIdx
    ? checkedIdx.map(i=>_comFiltered[i]).filter(Boolean)
    : _comFiltered;
  if(!rows.length){ alert('Nenhuma unidade selecionada.'); return; }

  const tRows=rows.map(r=>`<tr>
    <td>${r.status}</td>
    <td>${r.imovel||'-'}</td>
    <td><strong>${r.unidade||'-'}</strong></td>
    <td>${r.disposicao||'-'}</td>
    <td align="right">${r.vagas??'-'}</td>

    <td align="right">${r.loc_tabela?fmtR(r.loc_tabela):'-'}</td>

  const tot=rows.reduce((s,r)=>s+(r.valor_tabela||0),0);
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html lang="pt-BR"><head>
  <meta charset="UTF-8"><title>Grupo Yatil — Tabela Comercial</title>
  <style>
    body{font-family:'Segoe UI',Arial,sans-serif;font-size:11px;margin:20px;color:#111}
    h1{font-size:15px;margin-bottom:4px}p.sub{font-size:10px;color:#666;margin-bottom:14px}
    table{border-collapse:collapse;width:100%}
    th{background:#1a3a6e;color:#fff;padding:7px 9px;text-align:left;font-size:10px;text-transform:uppercase}
    td{padding:6px 9px;border-bottom:1px solid #e5e5e5;vertical-align:top}
    tr:nth-child(even){background:#f8f8f8}

    @media print{@page{margin:1cm}}
  </style></head><body>
  <h1>Grupo Yatil — Tabela Comercial</h1>
  <p class="sub">Gerado em ${new Date().toLocaleDateString('pt-BR')} · ${rows.length} unidades</p>
  <table>
  <thead><tr><th>Status</th><th>Empreendimento</th><th>Unidade</th><th>Tipo</th>
  <th>Vagas</th><th>m²INT</th><th>m²TOT</th><th>R$/m²</th><th>Valor Tabela</th><th>Loc.Tabela</th><th>Observações</th></tr></thead>
  <tbody>${tRows}</tbody>
  <tfoot><tr><td colspan="8" align="right">TOTAL VGV:</td><td><strong>${fmtR(tot)}</strong></td><td colspan="2"></td></tr></tfoot>

    tableHtml+=`<tr style="background:#1c2433"><td colspan="7" style="text-align:right;color:#6e7681;font-size:10px">Subtotal ${ref} →</td>

  tableHtml+=`</tbody>
    <tfoot><tr><td colspan="7" style="text-align:right">TOTAL GERAL →</td>
      <td class="r">${fmtR(totA)}</td><td></td>

  // Build simulator cartas selection list

    <div class="kcard"><div class="klabel">Cartas Selecionadas</div><div class="kval blue" id="sr-cnt">0</div></div>

function showCartaTab(tab){
  document.getElementById('cartas-ctrl').style.display=tab==='ctrl'?'block':'none';
  document.getElementById('cartas-sim').style.display=tab==='sim'?'block':'none';
  const active='background:#1f3666;border-color:#388bfd;color:#79b8ff';
  const idle='background:transparent;border-color:#30363d;color:#8b949e';
  document.getElementById('ctab-ctrl').style.cssText=`${tab==='ctrl'?active:idle}`;
  document.getElementById('ctab-sim').style.cssText=`${tab==='sim'?active:idle}`;
}

function calcSim(){
  const cbs=document.querySelectorAll('.sim-cb:checked');
  let sd=0,ca=0,ct=0,pm=0;
  cbs.forEach(cb=>{
    const c=S.cartas[parseInt(cb.dataset.idx)];
    if(!c) return;
    sd+=c.saldo_devedor||0;
    ca+=c.credito_atualizado||0;
    ct+=c.credito_tyago||0;
    pm+=c.valor_parcela||0;
  });
  const vim=parseFloat(document.getElementById('sim-vim')?.value)||0;
  const vne=parseFloat(document.getElementById('sim-vne')?.value)||0;
  const ent=parseFloat(document.getElementById('sim-ent')?.value)||0;
  const per=parseFloat(document.getElementById('sim-per')?.value)||0;
  const bal=parseFloat(document.getElementById('sim-bal')?.value)||0;
  const sdn=vne-ent-per-bal;
  const dg=vne-sd;
  const lim=vne*0.8;
  const pr=ct-sdn;
  const sv=id=>document.getElementById(id);
  if(sv('sr-cnt')) sv('sr-cnt').textContent=cbs.length;
  if(sv('sr-sd'))  sv('sr-sd').textContent=fmtR(sd);
  if(sv('sr-ca'))  sv('sr-ca').textContent=fmtR(ca);
  if(sv('sr-ct'))  sv('sr-ct').textContent=fmtR(ct);
  if(sv('sr-pm'))  sv('sr-pm').textContent=fmtR(pm);
  if(sv('sr-sdn')) sv('sr-sdn').textContent=fmtR(sdn);
  if(sv('sr-dg')){
    sv('sr-dg').textContent=fmtR(dg);
    sv('sr-dg').className='kval '+(dg>=0?'green':'red');
  }
  if(sv('sr-lim')) sv('sr-lim').textContent=fmtR(lim);
  if(sv('sr-pr')){
    sv('sr-pr').textContent=fmtR(pr);
    sv('sr-pr').className='kval '+(pr>=0?'green':'red');
    if(sv('sr-pr-lbl')) sv('sr-pr-lbl').textContent=pr>=0?'✓ Crédito suficiente':'⚠ Ajustar composição';
  }
  if(sd>lim&&vim>0&&sv('sr-lim')){
    sv('sr-lim').style.color='#f85149';
  } else if(sv('sr-lim')){
    sv('sr-lim').style.color='';
  }
}
